<div class="reviews-section">
    <div class="reviews-section-top">
        <div class="review-container">
            <img src="assets/img/reviews/quotation_marks.png" alt="">

            <p>{{ reviews[currentIndex].text | translate }}</p>

            <div class="reviewer-name">
                <div class="purple-line"></div>
                <p>{{ reviews[currentIndex].name }}</p>
            </div>
        </div>

        <div class="reviewer-container">
            <div class="purple-circle">
                <img class="reviewer-img-1" src="assets/img/reviews/reviewer.avif" alt=""
                    [style.display]="currentIndex === 0 ? 'block' : 'none'">
                <img class="reviewer-img-2" src="assets/img/reviews/reviewer_2.avif" alt=""
                    [style.display]="currentIndex === 1 ? 'block' : 'none'">
                <img class="reviewer-img-3" src="assets/img/reviews/reviewer_3.avif" alt=""
                    [style.display]="currentIndex === 2 ? 'block' : 'none'">
            </div>

            <div class="purple-line-short"></div>

            <img class="shadow" src="assets/img/reviews/shadow.avif" alt="">
        </div>
    </div>

    <div class="reviews-section-bottom">
        <div>
            <img src="assets/img/reviews/arrow_back.png" alt="" (click)="previousReview()">

            @for (review of reviews; track review.name; let i = $index) {
                <div>
                    <div class="purple-point"
                        [ngStyle]="{ 'background-color': currentIndex === i ? '#70E61C' : '#9747FF' }">
                    </div>
                </div>
            }

            <img src="assets/img/reviews/arrow_forward.png" alt="" (click)="nextReview()">
        </div>

    </div>
</div>
